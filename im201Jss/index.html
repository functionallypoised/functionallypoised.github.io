<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>P-HASE ARCHIVE</title>
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
  </head>
  <!-- My body indexing how the html will portray my media page. -->
  <body>
    <h1>P-HASE ARCHIVE</h1>

    <!-- a section of contained divisions of my tracks to 
   form a playlist UI & respective play buttons -->

    <section class="playlist-container">
      <div class="track">
        <h3>Hes</h3>
        <button onclick="loadTrack(1)">~:~ >> ~:~</button>
      </div>

      <div class="track">
        <h3>Dry Down</h3>
        <button onclick="loadTrack(2)">~:~ >> ~:~</button>
      </div>

      <div class="track">
        <h3>Leapt</h3>
        <button onclick="loadTrack(3)">~:~ >> ~:~</button>
      </div>

      <div class="track">
        <h3>Water Feature</h3>
        <button onclick="loadTrack(4)">~:~ >> ~:~</button>
      </div>
    </section>

    <!-- My classed id tags of media, to connect 
JS with the media divisions contained above -->

    <section class="player-container">
      <audio id="music-player" controls></audio>

      <p id="msg">
        .~:~ >> ~:~Select~:~ >> ~:~ singular P-hase layer~:~ >> ~:~.
      </p>
    </section>

    <!-- button to play all tracks at once ( for avantGard fun )
     button to pause last commands
     button to stop and refresh -->

    <section class="master-controls">
      <button onclick="release()">~:~ P-hase release [ON] ~:~</button>
      <button onclick="standby()">~:~ P-hase [STANDBY] ~:~</button>
      <button onclick="reset()">~:~ P-hase [OFF] ~:~</button>
    </section>

    <!-- i chose to add a section containing seperate Mixer Controls isolated 
 to each track,
  so it can function as a DJ simulator as well as an album archive-->

    <section class="mixer-container">
      <h2>Lay down a mix; curate a P-hase cloud</h2>

      <label>
        Hes
        <input
          type="range"
          min="0"
          max="1"
          step="0.01"
          value="1"
          id="volume-1"
        />
      </label>

      <label>
        Dry Down
        <input
          type="range"
          min="0"
          max="1"
          step="0.01"
          value="1"
          id="volume-2"
        />
      </label>

      <label>
        Leapt
        <input
          type="range"
          min="0"
          max="1"
          step="0.01"
          value="1"
          id="volume-3"
        />
      </label>

      <label>
        Water Feature
        <input
          type="range"
          min="0"
          max="1"
          step="0.01"
          value="1"
          id="volume-4"
        />
      </label>
    </section>

    <!-- the video media content id tags to connect
  JS controls with the video media -->

    <video
      id="miac-video"
      src="Naja-edit_vid_miac.mp4"
      autoplay
      loop
      muted
    ></video>
  </body>
</html>
