<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>P-HASE ARCHIVE</title>
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
  </head>
<!-- My body indexing how the html will portray my media page. -->
<body>
  <h1>P-HASE ARCHIVE</h1>

  <!-- a section of contained divisions of my tracks to 
   form a playlist UI -->
  <section class="playlist-container">

    <div class="track">
      <h3>Hes</h3>
      <button onclick="loadTrack(1)">Play</button>
    </div>

    <div class="track">
      <h3>Dry Down</h3>
      <button onclick="loadTrack(2)">Play</button>
    </div>

    <div class="track">
      <h3>Leapt</h3>
      <button onclick="loadTrack(3)">Play</button>
    </div>

    <div class="track">
      <h3>Water Feature</h3>
      <button onclick="loadTrack(4)">Play</button>
    </div>

  </section>
<!-- My classed id tags of media, to connect 
JS with the media divisions contained above -->

  <section class="player-container">

    <audio id="music-player" controls></audio>

    <p id="msg">Select a track.</p>

  </section>

  <!-- button to play all tracks at once ( for avantGard fun ) -->

<section class="master-controls">

  <button onclick="playAllTracks()">Play All</button>
  <button onclick="pauseTrack()">Pause All</button>
  
</section>
  <!-- the video media content id tags to connect
  JS controls with the video media -->

    <video id="star-video" src="stardust.mp4" controls></video>
  </body>
</html>
